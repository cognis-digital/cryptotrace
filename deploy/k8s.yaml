apiVersion: apps/v1
kind: Deployment
metadata: { name: cryptotrace, labels: { app: cryptotrace } }
spec:
  replicas: 1
  selector: { matchLabels: { app: cryptotrace } }
  template:
    metadata: { labels: { app: cryptotrace } }
    spec:
      containers:
        - name: cryptotrace
          image: ghcr.io/cognis-digital/cryptotrace:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: cryptotrace }
spec:
  selector: { app: cryptotrace }
  ports: [{ port: 80, targetPort: 8000 }]
